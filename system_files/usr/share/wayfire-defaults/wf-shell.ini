[background]
cycle_timeout = 610
fade_duration = 30
fill_mode = fill_and_crop


[locker]
background_image = true

[panel]
hibernate_command = systemctl ibernate
logout_command = wayland-logout
reboot_command = systemctl reboot
shutdown_command = systemctl poweroff
suspend_command = systemctl suspend

widgets_left=menu window-list
widgets_center=clock
widgets_right=brightness mixer network battery separator8 tray

clock_font = default 10pt
clock_format = %Y-%m-%d%n%A %H:%M

minimal_height = 40

[osk]
suggest_engine=enchant
suggestion_limit=10