[autostart]
session = wf-session-systemd-startup
autostart_wf_shell = false

[blur]
method = box
box_iterations = 3
box_offset = 5
degrade = 3
blur_by_default = all

[core]
background_color = \#000010FF
close_top_view = <alt> KEY_F4
exit = <alt> <ctrl> KEY_BACKSPACE
focus_button_with_modifiers = false
focus_buttons = BTN_LEFT | BTN_MIDDLE | BTN_RIGHT
focus_buttons_passthrough = true
plugins = autostart ipc-rules command gtk-shell invert idle blur place shortcuts-inhibit wayfire-shell window-rules xdg-activation grid ipc session-lock switcher input-method-v1 touchswitch security-context-v1 fast-switcher move resize wobbly pixdecor foreign-toplevel wm-actions copy-capture
xwayland = true

[input-method-v1]
enable_text_input_v1 = true
enable_text_input_v3 = true

[pixdecor]
always_decorate = none
animate = false
bg_color = \#373F58D9
bg_text_color = \#B3B3B3FF
border_size = 5
button_color = \#000000FF
button_hover_duration = 500
button_layout = :minimize,maximize,close
button_line_thickness = 0.700000
button_y_offset = 0
csd_titlebar_height = 32
effect_color = \#E01C24FF
effect_type = none
enable_shade = false
fg_color = \#25659AD9
fg_text_color = \#FFFFFFFF
ignore_views = none
left_button_spacing = 5
left_button_x_offset = 0
maximized_borders = true
maximized_shadows = false
overlay_engine = rounded_corners
right_button_spacing = 5
right_button_x_offset = 0
rounded_corner_radius = 5
shade_duration = 1000ms sigmoid
shade_modifier = <ctrl> <super>
shade_toggle =
shadow_color = \#00000040
shadow_radius = 10
title_font = Atkinson Hyperlegible Mono 12
title_text_align = 1
titlebar = never
