[systemd]
gtk_theme = Trigg-dark
icon_theme = Papirus-Dark
font_name = Atkinson Hyperlegible 8
overlay_scrolling = false
color_scheme=prefer-Dark

[component:wf-panel]
command = wf-panel
enabled = true
restart_on_crash = true
restart_on_graceful = true

[component:wf-dock]
command = wf-dock
enabled = false
restart_on_crash = true

[component:wf-background]
command = wf-background
enabled = true
restart_on_crash = true

[component:swayidle]
command = swayidle
enabled = true
restart_on_crash = true

[component:blueman-applet]
command = blueman-applet
enabled = true
restart_on_crash = true

[component:wf-osk]
command = wf-osk
enabled = false
restart_on_crash = true

[component:mako]
command = mako
enabled = true
restart_on_crash = true

[component:orientprompt]
command = orientprompt
enabled = true
restart_on_crash = true

[component:matepolkit]
command = /usr/libexec/polkit-mate-authentication-agent-1
enabled = true
restart_on_crash = true